name: Claude Warmup

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Random delay 1-10 min
        run: |
          DELAY=$(( (RANDOM % 10 + 1) * 60 ))
          echo "Sleeping $((DELAY/60)) minutes"
          sleep $DELAY

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping all accounts
        env:
          CLAUDE_TOKENS: ${{ secrets.CLAUDE_TOKENS }}
        run: |
          i=1
          echo "$CLAUDE_TOKENS" | jq -r '.[]' | while read -r token; do
            echo "=== Pinging account $i ==="
            CLAUDE_CODE_OAUTH_TOKEN="$token" claude -p "ok" --model haiku || echo "Account $i failed, continuing..."
            i=$((i+1))
          done
