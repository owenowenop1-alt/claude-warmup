name: Claude Warmup

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Random delay 1-10 min
        run: |
          DELAY=$(( (RANDOM % 10 + 1) * 60 ))
          echo "Sleeping $((DELAY/60)) minutes"
          sleep $DELAY

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping account 1
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN_1 }}
        run: claude -p "ok" --model haiku

      - name: Ping account 2
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN_2 }}
        run: claude -p "ok" --model haiku
